workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

default:
  # Only retry on infrastructure failures, never on test/lint failures --
  # unconditional retry masks flaky tests and hides real intermittents.
  retry:
    max: 1
    when: runner_system_failure
  artifacts:
    expire_in: 1 week

stages:
  - lint
  - typecheck
  - build
  - test
  - dr-compliance
  - pages
  - publish-test
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"
  # Full clone history. Version is static (see [project].version); this is
  # retained for the publish job, which inspects and checks out release tags.
  GIT_DEPTH: "0"
  # Pin Poetry to avoid silent drift.
  POETRY_PIN: "2.4.1"
  RELEASE_TAG:
    value: ""
    description: "Tag to publish to TestPyPI/PyPI from a manually triggered default-branch web pipeline."

# Clone the shared example-datasets repo to one canonical location used by every
# job that needs it (docs build + e2e integration matrix), and export
# DATAMAITE_DATASETS_ROOT so the tutorial notebooks and e2e tests both resolve
# datasets the same way. The repo stores media (.mp4/.jpg/...) in git-LFS.
.clone_example_data: &clone_example_data
  # Trust the GitLab checkout for build backends that call git to derive package metadata.
  - git config --global --add safe.directory "$CI_PROJECT_DIR"
  # Register the LFS smudge/clean filters (global; the apt git-lfs package only
  # installs the binary, not the git config).
  - git lfs install
  # Derive host + namespace instead of hardcoding them (CI_PROJECT_NAMESPACE ==
  # jatic/orchestration-interoperability); CI_JOB_TOKEN authorizes the cross-repo
  # clone (allowlisted in the datasets project's job-token permissions).
  - git clone --depth 1
      "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_NAMESPACE}/datamaite-example-datasets.git"
      "${CI_PROJECT_DIR}/example-data"
  # Pull explicitly so the shallow clone gets real binaries, not LFS pointers.
  - git -C "${CI_PROJECT_DIR}/example-data" lfs pull
  # Both the notebooks and the e2e tests read this env var to locate the
  # datasets. Absolute path so it resolves regardless of execution CWD.
  - export DATAMAITE_DATASETS_ROOT="${CI_PROJECT_DIR}/example-data/datasets"

.shared-setup:
  interruptible: true
  image: python:${VERSION}-slim
  timeout: 20m
  before_script:
    # Install OS deps required by our toolchain:
    #   git        -- pre-commit needs it; slim images don't ship it
    #   git-lfs    -- the example-datasets repo stores media (.mp4/.jpg/...) in
    #                 git-LFS; without it `git clone` yields pointer files and the
    #                 tutorial notebooks fail to decode video in the docs build
    #   libatomic1 -- pyright's embedded Node runtime needs it
    - apt-get update -qq && apt-get install -y -qq git git-lfs libatomic1
    # Trust the GitLab checkout for build backends that call git to derive package metadata.
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - pip install --quiet --upgrade pip
    - pip install --quiet "poetry==${POETRY_PIN}"
    - poetry config virtualenvs.in-project true
    - python --version
    - poetry --version
    - poetry check
  cache:
    # Key the venv cache per job (CI_JOB_NAME), not just per Python version.
    # Jobs install different dependency extras (lint/typecheck/test use
    # --extras dev; build runs `poetry build` with none), but they previously
    # shared one key per Python version. Last-writer-wins then let a job
    # restore a .venv another job had populated without the dev extra, so
    # `poetry install --extras dev` no-op'd and `pre-commit` was missing.
    - key:
        files:
          - poetry.lock
        prefix: "venv-${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
      paths:
        - .venv/
    - key: pip-downloads
      paths:
        - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:
  extends: .shared-setup
  stage: lint
  needs: []
  variables:
    VERSION: "3.11"
  script:
    - poetry install --extras dev --no-root
    - poetry run pre-commit run --all-files

# ---------------------------------------------------------------------------
# Type checking
# ---------------------------------------------------------------------------
pyright:
  extends: .shared-setup
  stage: typecheck
  needs: []
  variables:
    VERSION: "3.11"
  script:
    # Task extras (all) + maite so cv2/numpy/av/maite resolve and pyright
    # stays at 0 warnings; dev for the toolchain.
    - poetry install --extras dev --extras maite --extras all
    - poetry run pyright src/

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build:
  extends: .shared-setup
  stage: build
  needs: []
  variables:
    VERSION: "3.11"
  script:
    - poetry build
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
      python - "$CI_COMMIT_TAG" <<'PY'
      import sys
      from pathlib import Path
      from packaging.utils import parse_sdist_filename, parse_wheel_filename
      from packaging.version import Version

      expected = Version(sys.argv[1].removeprefix("v"))
      matched = 0
      for artifact in Path("dist").iterdir():
          if artifact.suffix == ".whl":
              _, version, _, _ = parse_wheel_filename(artifact.name)
          elif artifact.name.endswith(".tar.gz"):
              _, version = parse_sdist_filename(artifact.name)
          else:
              continue
          matched += 1
          if version != expected:
              raise SystemExit(
                  f"Built artifact {artifact.name} has version {version}, expected tag version {expected}."
              )

      if matched == 0:
          raise SystemExit("No wheel or sdist artifacts were built in dist/.")
      print(f"Verified {matched} artifact(s) for version {expected}.")
      PY
      fi
    - |
      status="$(git status --porcelain)"
      if [ -n "$status" ]; then
        echo "Build left tracked/unignored worktree changes:"
        printf '%s\n' "$status"
        exit 1
      fi
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Build and publish the distribution for an existing release tag. PyPI and
# TestPyPI use API tokens because PyPI/TestPyPI have not yet onboarded
# gitlab.jatic.net as a trusted self-managed GitLab issuer.
# Run from CI/CD -> Pipelines -> Run pipeline on the default branch with
# RELEASE_TAG set, publishing to TestPyPI first and then PyPI.
.publish-python-package:
  stage: publish
  image: python:3.11-slim
  retry: 0
  interruptible: false
  resource_group: pypi-publish
  timeout: 20m
  # Publish jobs build release artifacts from the checked-out tag and should not
  # download artifacts from earlier stages; those reports make the worktree dirty.
  dependencies: []
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: never
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - pip install --quiet --upgrade pip
    - pip install --quiet "poetry==${POETRY_PIN}" "twine==6.2.0" "check-wheel-contents==0.6.3"
    - python --version
    - poetry --version
    - twine --version
    - check-wheel-contents --version
  script:
    - |
      set -euo pipefail

      if [ -z "${RELEASE_TAG:-}" ]; then
        echo "RELEASE_TAG must be set in the 'Run pipeline' form (CI/CD -> Pipelines -> Run pipeline)."
        exit 1
      fi

      RELEASE_TAG="$(printf '%s' "$RELEASE_TAG" | tr -d '[:space:]')"
      if ! [[ "$RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
        echo "RELEASE_TAG '$RELEASE_TAG' must match X.Y.Z with no 'v' prefix."
        exit 1
      fi

      if [ "${PYPI_ENVIRONMENT_NAME}" = "TestPyPI" ]; then
        if [ -z "${TEST_PYPI_API_TOKEN:-}" ]; then
          echo "TEST_PYPI_API_TOKEN is not available; add a masked/protected TestPyPI API token in GitLab CI/CD variables."
          exit 1
        fi
        export TWINE_USERNAME="__token__"
        export TWINE_PASSWORD="$TEST_PYPI_API_TOKEN"
      else
        if [ -z "${PYPI_API_TOKEN:-}" ]; then
          echo "PYPI_API_TOKEN is not available; add a masked/protected PyPI API token in GitLab CI/CD variables."
          exit 1
        fi
        export TWINE_USERNAME="__token__"
        export TWINE_PASSWORD="$PYPI_API_TOKEN"
      fi

      echo "Publish to ${PYPI_ENVIRONMENT_NAME} triggered by ${GITLAB_USER_LOGIN:-unknown} (${GITLAB_USER_EMAIL:-unknown}) at $(date -u +%FT%TZ)."

      git fetch --no-tags origin "+refs/heads/${CI_DEFAULT_BRANCH}:refs/remotes/origin/${CI_DEFAULT_BRANCH}"

      REMOTE_TAG_OBJECT="$(git ls-remote --tags --refs origin "refs/tags/${RELEASE_TAG}" | awk 'NF {print $1; exit}')"
      if [ -z "$REMOTE_TAG_OBJECT" ]; then
        echo "RELEASE_TAG '$RELEASE_TAG' not found on origin."
        exit 1
      fi

      if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
        LOCAL_TAG_OBJECT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}")"
        if [ "$LOCAL_TAG_OBJECT" != "$REMOTE_TAG_OBJECT" ]; then
          echo "Tag '$RELEASE_TAG' on origin ($REMOTE_TAG_OBJECT) does not match local ($LOCAL_TAG_OBJECT); refusing to publish."
          exit 1
        fi
      else
        git fetch --no-tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
      fi

      TAG_COMMIT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
      echo "Publishing ${RELEASE_TAG} (${TAG_COMMIT}) to ${PYPI_ENVIRONMENT_NAME}."

      if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${CI_DEFAULT_BRANCH}"; then
        echo "RELEASE_TAG ${RELEASE_TAG} (${TAG_COMMIT}) is not on origin/${CI_DEFAULT_BRANCH}."
        exit 1
      fi

      rm -rf dist/
      git checkout --detach "$TAG_COMMIT"
      poetry build
      twine check dist/*
      check-wheel-contents dist/*.whl
      python - "$RELEASE_TAG" <<'PY'
      import sys
      from pathlib import Path
      from packaging.utils import parse_sdist_filename, parse_wheel_filename
      from packaging.version import Version

      expected = Version(sys.argv[1])
      matched = 0
      for artifact in Path("dist").iterdir():
          if artifact.suffix == ".whl":
              _, version, _, _ = parse_wheel_filename(artifact.name)
          elif artifact.name.endswith(".tar.gz"):
              _, version = parse_sdist_filename(artifact.name)
          else:
              continue
          matched += 1
          if version != expected:
              raise SystemExit(
                  f"Built artifact {artifact.name} has version {version}, expected tag version {expected}."
              )

      if matched == 0:
          raise SystemExit("No wheel or sdist artifacts were built in dist/.")
      print(f"Verified {matched} artifact(s) for version {expected}.")
      PY
      status="$(git status --porcelain)"
      if [ -n "$status" ]; then
        echo "Build left tracked/unignored worktree changes:"
        printf '%s\n' "$status"
        exit 1
      fi
      twine upload --non-interactive --disable-progress-bar --skip-existing dist/*

publish-testpypi:
  extends: .publish-python-package
  stage: publish-test
  environment:
    name: pypi-test
    url: https://test.pypi.org/project/datamaite/
  variables:
    PYPI_ENVIRONMENT_NAME: "TestPyPI"
    TWINE_REPOSITORY_URL: "https://test.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never

publish-pypi:
  extends: .publish-python-package
  environment:
    name: pypi-production
    url: https://pypi.org/project/datamaite/
  variables:
    PYPI_ENVIRONMENT_NAME: "PyPI"
    TWINE_REPOSITORY_URL: "https://upload.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never

# Builds Sphinx HTML and publishes to GitLab Pages on every push to the default branch.
pages:
  extends: .shared-setup
  stage: pages
  variables:
    VERSION: "3.12"
  script:
    - *clone_example_data
    # docs extra bundles the Sphinx toolchain and notebook/all/maite runtime
    # deps the tutorial notebooks import when myst-nb executes them.
    - poetry install --extras docs
    - poetry run sphinx-build -b html docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never

# Builds a Sphinx HTML preview for every merge request.
# The rendered docs are accessible via the "Documentation Preview" artifact link in the MR.
pages-preview:
  extends: .shared-setup
  stage: pages
  variables:
    VERSION: "3.12"
  script:
    - *clone_example_data
    # docs extra bundles the Sphinx toolchain and notebook/all/maite runtime
    # deps the tutorial notebooks import when myst-nb executes them.
    - poetry install --extras docs
    - poetry run sphinx-build -b html docs public
  artifacts:
    expose_as: "Documentation Preview"
    paths:
      - public/
  environment:
    name: docs-preview/$CI_MERGE_REQUEST_IID
    url: "https://gitlab.jatic.net/jatic/orchestration-interoperability/datamaite/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
    auto_stop_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - when: never

# ---------------------------------------------------------------------------
# Test matrix (Python 3.10, 3.11, 3.12)
# ---------------------------------------------------------------------------
.test-base:
  extends: .shared-setup
  stage: test
  timeout: 30m
  script:
    # all (cv2/av) media decoders + maite extra (maite/numpy/av) so the
    # datamaite.maite tests run and count toward the 90% coverage gate; dev tooling.
    - poetry install --extras dev --extras maite --extras all
    - poetry run pytest tests -vvv --cov=datamaite --cov-report term-missing
        --cov-report xml:coverage_report.xml --cov-fail-under=90
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - coverage_report.xml
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml

test-py310:
  extends: .test-base
  variables:
    VERSION: "3.10"

test-py311:
  extends: .test-base
  variables:
    VERSION: "3.11"

test-py312:
  extends: .test-base
  variables:
    VERSION: "3.12"

# ---------------------------------------------------------------------------
# Integration (e2e): cross-format conversion matrix against the shared example-data
# repo (jatic/orchestration-interoperability/datamaite-example-datasets). Loads
# every input format and round-trips it through every box output format,
# asserting the counts in tests/e2e/test_example_data_matrix.py. These e2e tests
# live under tests/e2e/ (vs. the always-on hermetic suite in tests/); see
# tests/README.md for the two-tier layout.
#
# Runs the opt-in `integration` marker only, with the coverage gate disabled
# (the matrix exercises a subset, not the whole package). Dataset data is fetched
# with git-LFS via CI_JOB_TOKEN. The datamaite-example-datasets project
# allowlists this project under Settings -> CI/CD -> Job token permissions,
# so the cross-repo clone + LFS pull is authorized and gates the pipeline.
# ---------------------------------------------------------------------------
integration:
  extends: .shared-setup
  stage: test
  timeout: 30m
  variables:
    VERSION: "3.12"
  allow_failure: false
  script:
    # Clone the shared example datasets and export DATAMAITE_DATASETS_ROOT.
    # Clones the default branch (main): the multi-format datasets/<format>/
    # layout and the counts this matrix asserts are merged there.
    - *clone_example_data
    - poetry install --extras dev --extras maite --extras all
    # -s so the end-of-run matrix summary table is shown in the job log.
    # Scope to tests/e2e (the e2e tier) and the `integration` marker.
    - poetry run pytest tests/e2e -m integration -v -s --cov-fail-under=0

# ---------------------------------------------------------------------------
# DR Compliance (JATIC program requirement)
#
# allow_failure: true -- dr-compliance scans can produce false positives
# against transitive deps. Failing scans are visible in the UI and triaged
# async, not hidden.
# ---------------------------------------------------------------------------
include:
  # Component address and base image come from project CI/CD variables
  # (DR_COMPLIANCE_COMPONENT, DR_COMPLIANCE_IMAGE) so the URLs are not in the
  # tracked file. The version is pinned here.
  - component: ${DR_COMPLIANCE_COMPONENT}@0.5.2
    inputs:
      stage: dr-compliance
      # tests: hermetic test suite (standard SAST exclusion).
      # tools: developer-only benchmark/diagnostic scripts (see tools/*/README).
      #   They never ship -- the wheel packages only src/datamaite and the
      #   sdist builds from an explicit src+tests allowlist -- so they are
      #   scanned by the local toolchain (ruff S-rules, bandit) but excluded
      #   from the compliance SAST tier like the tests they support.
      sast_excluded_paths: tests, tools
      image: ${DR_COMPLIANCE_IMAGE}
      full_execution_on_commit: true
      allow_failure: true

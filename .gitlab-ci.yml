workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

default:
  # Only retry on infrastructure failures, never on test/lint failures --
  # unconditional retry masks flaky tests and hides real intermittents.
  retry:
    max: 1
    when: runner_system_failure
  artifacts:
    expire_in: 1 week

stages:
  - lint
  - typecheck
  - build
  - test
  - dr-compliance
  - publish
  - pages

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"
  # Full clone history so hatch-vcs can compute the correct devN version.
  GIT_DEPTH: "0"
  # Pin Poetry to avoid silent drift.
  POETRY_PIN: "2.4.1"

.shared-setup:
  interruptible: true
  image: python:${VERSION}-slim
  timeout: 20m
  before_script:
    # Install OS deps required by our toolchain:
    #   git       -- pre-commit needs it; slim images don't ship it
    #   libatomic1 -- pyright's embedded Node runtime needs it
    - apt-get update -qq && apt-get install -y -qq git libatomic1
    - pip install --quiet --upgrade pip
    - pip install --quiet "poetry==${POETRY_PIN}"
    - poetry config virtualenvs.in-project true
    - python --version
    - poetry --version
    - poetry check
  cache:
    # Key the venv cache per job (CI_JOB_NAME), not just per Python version.
    # Jobs install different dependency groups (lint/typecheck/test use
    # --with dev; build runs `poetry build` with none), but they previously
    # shared one key per Python version. Last-writer-wins then let a job
    # restore a .venv another job had populated without the dev group, so
    # `poetry install --with dev` no-op'd and `pre-commit` was missing.
    - key:
        files:
          - poetry.lock
        prefix: "venv-${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
      paths:
        - .venv/
    - key: pip-downloads
      paths:
        - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:
  extends: .shared-setup
  stage: lint
  variables:
    VERSION: "3.11"
  script:
    - poetry install --with dev --no-root
    - poetry run pre-commit run --all-files

# ---------------------------------------------------------------------------
# Type checking
# ---------------------------------------------------------------------------
pyright:
  extends: .shared-setup
  stage: typecheck
  variables:
    VERSION: "3.11"
  script:
    # video + maite groups so cv2/numpy/av/maite resolve and pyright stays at
    # 0 warnings (reportMissingImports would otherwise fire on the adapters).
    - poetry install --with dev --with video --with maite
    - poetry run pyright src/

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build:
  extends: .shared-setup
  stage: build
  variables:
    VERSION: "3.11"
  script:
    - poetry build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Publish to GitLab Package Registry.
# Only on tagged commits, after all tests pass.
publish:
  extends: .shared-setup
  stage: publish
  needs:
    - test-py310
    - test-py311
    - test-py312
    - build
  resource_group: publish
  timeout: 10m
  variables:
    VERSION: "3.11"
  script:
    - poetry build
    - pip install --quiet "twine>=6.0"
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token
      twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never

# Builds Sphinx HTML and publishes to GitLab Pages on every push to the default branch.
pages:
  extends: .shared-setup
  stage: pages
  variables:
    VERSION: "3.12"
  script:
    - poetry install --with docs
    - poetry run sphinx-build -b html docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never

# Builds a Sphinx HTML preview for every merge request.
# The rendered docs are accessible via the "Documentation Preview" artifact link in the MR.
pages-preview:
  extends: .shared-setup
  stage: pages
  variables:
    VERSION: "3.12"
  script:
    - poetry install --with docs
    - poetry run sphinx-build -b html docs public
  artifacts:
    expose_as: "Documentation Preview"
    paths:
      - public/
  environment:
    name: docs-preview/$CI_MERGE_REQUEST_IID
    url: "https://gitlab.jatic.net/jatic/orchestration-interoperability/datamaite/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
    auto_stop_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - when: never

# ---------------------------------------------------------------------------
# Test matrix (Python 3.10, 3.11, 3.12)
# ---------------------------------------------------------------------------
.test-base:
  extends: .shared-setup
  stage: test
  timeout: 30m
  script:
    # maite group adds the MAITE adapters' deps (maite/numpy/av) so the
    # datamaite.maite tests run and count toward the 90% coverage gate.
    - poetry install --with dev --with video --with maite
    - poetry run pytest tests -vvv --cov=datamaite --cov-report term-missing
        --cov-report xml:coverage_report.xml --cov-fail-under=90
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - coverage_report.xml
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml

test-py310:
  extends: .test-base
  variables:
    VERSION: "3.10"

test-py311:
  extends: .test-base
  variables:
    VERSION: "3.11"

test-py312:
  extends: .test-base
  variables:
    VERSION: "3.12"

# ---------------------------------------------------------------------------
# DR Compliance (JATIC program requirement)
#
# allow_failure: true -- dr-compliance scans can produce false positives
# against transitive deps. Failing scans are visible in the UI and triaged
# async, not hidden.
# ---------------------------------------------------------------------------
include:
  # Component address and base image come from project CI/CD variables
  # (DR_COMPLIANCE_COMPONENT, DR_COMPLIANCE_IMAGE) so the URLs are not in the
  # tracked file. The version is pinned here.
  - component: ${DR_COMPLIANCE_COMPONENT}@0.5.2
    inputs:
      stage: dr-compliance
      sast_excluded_paths: tests
      image: ${DR_COMPLIANCE_IMAGE}
      full_execution_on_commit: true
      allow_failure: true

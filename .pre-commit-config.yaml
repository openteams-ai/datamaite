repos:
  # -----------------------------------------------------------------------
  # General file hygiene
  # -----------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  # -----------------------------------------------------------------------
  # Ruff -- lint + format
  # -----------------------------------------------------------------------
  # Keep this version in sync with the ruff pin in pyproject.toml dev deps.
  # A version mismatch makes pre-commit and `uv run ruff` disagree about
  # style rules (e.g. @pytest.fixture paren style, noqa comment validity).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # -----------------------------------------------------------------------
  # Bandit -- security scanning
  # -----------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.10"
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        additional_dependencies: ["bandit[toml]"]

  # -----------------------------------------------------------------------
  # nbstripout -- strip cell outputs from committed .ipynb files
  # -----------------------------------------------------------------------
  # Stripping notebook outputs at commit time keeps any sensitive data
  # that ended up in cell outputs during exploration from being pushed
  # back to the repo by mistake.
  - repo: https://github.com/kynan/nbstripout
    rev: "0.7.1"
    hooks:
      - id: nbstripout
